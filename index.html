    function playSound(type) {
      try {
        const ctx = new (window.AudioContext||window.webkitAudioContext)();
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        if(type==="dice")   {o.frequency.value=300;o.type="square";g.gain.setValueAtTime(0.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3);}
        if(type==="correct"){o.type="sine";o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+0.12);o.frequency.setValueAtTime(784,ctx.currentTime+0.24);g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.55);o.start();o.stop(ctx.currentTime+0.55);}
        if(type==="wrong")  {o.frequency.value=180;o.type="sawtooth";g.gain.setValueAtTime(0.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);o.start();o.stop(ctx.currentTime+0.4);}
        if(type==="move")   {o.frequency.value=440;o.type="sine";g.gain.setValueAtTime(0.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.1);o.start();o.stop(ctx.currentTime+0.1);}
      } catch(e){}
    }

    // 指数バックオフ付きAPI呼び出し
    async function fetchWithRetry(url, options, retries = 5) {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === retries - 1) throw error;
          await new Promise(res => setTimeout(res, delays[i]));
        }
      }
    }

      const animateMove=useCallback((player,from,to,onDone)=>{
        if(animRef.current)return;
        animRef.current=true;
        let cur=from;
        const step=()=>{
          if(cur>=to){animRef.current=false;onDone();return;}
          cur++;playSound("move");
          setDisplayPos(prev=>{const p=[...prev];p[player]=cur;return p;});
          setTimeout(step,200);

        setTimeout(step,100);

      const rollDice=()=>{
        if(animRef.current||phase!=="roll")return;
        playSound("dice");
        let count=0;
        const iv=setInterval(()=>{
          setDiceValue(Math.ceil(Math.random()*6));
          if(++count>=10){
            clearInterval(iv);

            const from=positions[currentPlayer];
            const rawTo=Math.min(from+final,BOARD_SIZE-1);

- 単位が1種類の場合：「85cm」「450g」のように数値＋単位

【問題文にも表記例を明示すること】
長さや重さの問題では、問題文の末尾に「（答えは○m○cmの形で書いてください）」のように回答形式を指示してください。
解説（explanation_es）および、練習問題（practiceQuestions）についても、必ず問題文（question_es）と解説（explanation_es）のスペイン語訳を含めてください。`;

        try {
          if (!apiKey) throw new Error("API Key is empty");
          
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  qid: { type: "STRING", description: "問題を一言で識別するID（例: add_356+247, mult_8x7）" },
                  question: { type: "STRING", description: "問題文・日本語（長さ・重さ・時刻の場合は末尾に回答形式の指示を含める）" },
                  question_es: { type: "STRING", description: "同じ問題文のスペイン語訳（回答形式の指示もスペイン語で）" },
                  answer: { type: "STRING", description: "ルールに従った答え（例: 3m20cm / 2kg300g / 10時45分 / 603）" },
                  hint: { type: "STRING", description: "短いヒント" },
                  explanation: { type: "STRING", description: "まちがえた子へのやさしい解説（計算手順）" },
                  explanation_es: { type: "STRING", description: "解説のスペイン語訳" },
                  svg: { type: "STRING", description: "解説図のSVGコード（viewBox='0 0 260 150'、font-family='sans-serif'属性必須、日本語テキスト含む、計算過程を図示）" },
                  practiceQuestions: {
                    type: "ARRAY",
                    items: {
                      type: "OBJECT",
                      properties: {
                        question: { type: "STRING" },
                        question_es: { type: "STRING" },
                        answer: { type: "STRING" },
                        hint: { type: "STRING" },
                        explanation: { type: "STRING" },
                        explanation_es: { type: "STRING" },
                        svg: { type: "STRING" }
                      }
                    }
                  }
                }
              }
            }
          };

          const result = await fetchWithRetry(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
          const q = JSON.parse(text);
          setQuestion(q);
          setUsedQids(prev => [...prev, q.qid || q.question.slice(0, 20)]);
          setPhase("answer"); speak(q.question);
          
        } catch (e) {
          console.error(e);
          // APIキーがない、またはエラーの場合はフォールバックから出題
          const available = FALLBACK_POOL.map((q, i) => ({ q, i })).filter(({ q, i }) => !usedQids.includes(`fb_${i}`));
          const pick = available.length > 0 ? available[Math.floor(Math.random() * available.length)] : { q: FALLBACK_POOL[0], i: 0 };
          const q = { ...pick.q };
          const qid = `fb_${pick.i}`;
          setUsedQids(prev => [...prev, qid]);
          
          const sameType = FALLBACK_POOL.map((p, i) => ({ p, i })).filter(({ p, i }) => p.type === q.type && i !== pick.i);
          const pqs = sameType.slice(0, 3).map(({ p }) => ({ question: p.question, question_es: p.question_es, answer: p.answer, hint: p.hint, explanation: p.explanation, explanation_es: p.explanation_es, svg: p.svg }));
          setQuestion({ ...q, qid, practiceQuestions: pqs });
          setPhase("answer"); speak(q.question);
        }
        setLoading(false);
        setTimeout(() => inputRef.current?.focus(), 100);
      };

      const normalizeAnswer=(s)=>{
        return String(s).trim()
          .replace(/[\s　]+/g,"")
          .replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
          .replace(/[ａ-ｚＡ-Ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
          .replace(/[mM][cC][mM]/g,"mcm")
          .replace(/[cC][mM]/g,"cm")
          .replace(/[kK][gG]/g,"kg")
          .replace(/[mM](?!c)/g,"m")
          .replace(/[gG](?!$)/g,s=>s==="g"||s==="G"?"g":s)
          .replace(/時/g,"時").replace(/分/g,"分")
          .toLowerCase();
      };

      const submitAnswer=()=>{
        if(!question||!userAnswer||phase!=="answer")return;
        const correct=normalizeAnswer(userAnswer)===normalizeAnswer(question.answer);
        if(correct){
          playSound("correct");speak("せいかい！");
          setFeedback({correct:true,msg:`✅ せいかい！答えは ${question.answer}`,explanation:null,svg:null});
          setScores(prev=>{const s=[...prev];s[currentPlayer]++;return s;});
          setPhase("result");
        } else {
          playSound("wrong");
          speak(`ざんねん！正解は${question.answer}でした。${question.explanation||""}`);
          const from=positions[currentPlayer];
          const to=Math.max(0,from-3);
          setFeedback({correct:false,msg:`❌ ざんねん！正解は ${question.answer}。3マス戻る`,explanation:question.explanation||question.hint,explanation_es:question.explanation_es||question.hint,svg:question.svg||null});
          animateMove(currentPlayer,from,to,()=>{
            setPositions(prev=>{const p=[...prev];p[currentPlayer]=to;return p;});
          });
          setPhase("result");
        }
        saveGame({positions,currentPlayer,scores});
      };

      const startPractice=()=>{
        const pqs=question?.practiceQuestions||[];
        if(pqs.length===0){nextTurn();return;}
        setPracticeQuestions(pqs);
        setPracticeIndex(0);
        setPracticeAnswer("");
        setPracticeFeedback(null);
        setPracticeReturnPos(positions[currentPlayer]);
        setPhase("practice");
        speak(pqs[0].question);
        setTimeout(()=>practiceRef.current?.focus(),100);
      };

      const submitPractice=()=>{
        if(!practiceAnswer)return;
        const pq=practiceQuestions[practiceIndex];
        const correct=normalizeAnswer(practiceAnswer)===normalizeAnswer(pq.answer);
        if(correct){playSound("correct");speak("せいかい！");}
        else{playSound("wrong");speak(`ざんねん。正解は${pq.answer}でした。`);}
        setPracticeFeedback({correct,answer:pq.answer,explanation:pq.explanation,explanation_es:pq.explanation_es||pq.hint,svg:pq.svg});
      };

      const nextPractice=()=>{
        const next=practiceIndex+1;
        if(next>=practiceQuestions.length){
          const returnPos=practiceReturnPos;
          const cur=positions[currentPlayer];
          if(returnPos!==null&&returnPos!==cur){
            animateMove(currentPlayer,cur,returnPos,()=>{
              setPositions(prev=>{const p=[...prev];p[currentPlayer]=returnPos;return p;});
            });
          }
          speak("練習おわり！元のマスに戻ります。");
          setPracticeQuestions([]);setPracticeIndex(0);setPracticeFeedback(null);setPracticeReturnPos(null);
          nextTurn();
        } else {
          setPracticeIndex(next);setPracticeAnswer("");setPracticeFeedback(null);
          speak(practiceQuestions[next].question);
          setTimeout(()=>practiceRef.current?.focus(),100);
        }
      };

      const nextTurn=()=>{
        const next=1-currentPlayer;
        setCurrentPlayer(next);setPhase("roll");
        setQuestion(null);setUserAnswer("");setFeedback(null);
      };

      const handleLoad=()=>{
        const s=loadGame();if(!s)return;
        setPositions(s.positions);setDisplayPos(s.positions);
        setCurrentPlayer(s.currentPlayer);setScores(s.scores||[0,0]);
        setPhase("roll");setWinner(null);
      };
      const handleNew=()=>{
        setPositions([0,0]);setDisplayPos([0,0]);setCurrentPlayer(0);
        setScores([0,0]);setPhase("roll");setWinner(null);setDiceValue(null);
        setUsedQids([]);clearSave();setHasSave(false);
      };

      // ---- board SVG ----
      const svgW=COLS*CELL_SIZE+20,svgH=ROWS*CELL_SIZE+20,ox=10,oy=10;
      const cellColor=i=>{
        if(i===0)return"#2ecc71";if(i===BOARD_SIZE-1)return"#f39c12";
        const sp=SPECIAL_SQUARES[i];if(sp)return sp.type==="forward"?"#d5f5e3":"#fadbd8";
        return i%2===0?"#eaf4fb":"#fdfefe";
      };
      const renderBoard=()=>{
        const cells=[];
        for(let i=0;i<BOARD_SIZE;i++){
          const{col,row}=cellPos(i);const x=ox+col*CELL_SIZE,y=oy+row*CELL_SIZE;
          const sp=SPECIAL_SQUARES[i];
          cells.push(<g key={i}>
            <rect x={x} y={y} width={CELL_SIZE-2} height={CELL_SIZE-2} rx={6} fill={cellColor(i)} stroke="#bdc3c7" strokeWidth={1.5}/>
            <text x={x+4} y={y+14} fontSize={10} fill="#95a5a6">{i===0?"S":i===BOARD_SIZE-1?"G":i}</text>
            {sp&&<text x={x+CELL_SIZE/2-1} y={y+CELL_SIZE/2+4} fontSize={10} textAnchor="middle" fill={sp.type==="forward"?"#27ae60":"#e74c3c"} fontWeight="bold">{sp.label}</text>}
            {i===0&&<text x={x+CELL_SIZE/2-1} y={y+CELL_SIZE/2+4} fontSize={13} textAnchor="middle" fill="#1a5c35" fontWeight="bold">スタート</text>}
            {i===BOARD_SIZE-1&&<text x={x+CELL_SIZE/2-1} y={y+CELL_SIZE/2+4} fontSize={13} textAnchor="middle" fill="#7d4700" fontWeight="bold">ゴール</text>}
          </g>);
        }
        const tokens=displayPos.map((pos,pi)=>{
          const{col,row}=cellPos(pos);
          const cx=ox+col*CELL_SIZE+CELL_SIZE/2+(pi===0?-8:8),cy=oy+row*CELL_SIZE+CELL_SIZE/2+8;
          return(<g key={`p${pi}`} style={{transition:"all 0.18s ease"}}>
            <circle cx={cx} cy={cy} r={12} fill={PLAYER_COLORS[pi]} stroke="white" strokeWidth={2.5} style={{filter:"drop-shadow(0 2px 3px rgba(0,0,0,0.35))"}}/>
            <text x={cx} y={cy+4} fontSize={11} textAnchor="middle" fill="white" fontWeight="bold">{pi+1}</text>
          </g>);
        });
        return(<svg width={svgW} height={svgH} style={{display:"block",margin:"0 auto",maxWidth:"100%"}}>{cells}{tokens}</svg>);
      };

      const curPQ=practiceQuestions[practiceIndex];

      return(
        <div style={{fontFamily:"'Hiragino Kaku Gothic Pro','Meiryo',sans-serif",maxWidth:620,margin:"0 auto",padding:10,background:"#fff",minHeight:"100vh"}}>
          <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}} @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}} button:active{transform:scale(0.96)}`}</style>

          <h1 style={{textAlign:"center",margin:"0 0 8px",fontSize:20,color:"#2c3e50"}}>🎲 算数すごろく</h1>

          <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:8,flexWrap:"wrap"}}>
            {hasSave&&<button onClick={handleLoad} style={btn("#3498db")}>💾 続きから</button>}
            <button onClick={handleNew} style={btn("#e74c3c")}>🆕 新規</button>
            <button onClick={()=>setShowKey(v=>!v)} style={btn("#95a5a6")}>🔑 APIキー設定</button>
          </div>
          
          {showKey && (
            <div style={{animation:"fadeIn 0.3s"}}>
              <input value={apiKey} type="password" placeholder="Gemini APIキーを入力..."
                onChange={e=>{setApiKey(e.target.value);localStorage.setItem("sug_key_gemini",e.target.value);}}
                style={{width:"100%",padding:8,fontSize:14,border:"1px solid #ddd",borderRadius:6,marginBottom:8,boxSizing:"border-box"}}/>
              <div style={{fontSize:11,color:"#777",marginBottom:10,textAlign:"center"}}>※キー未入力時は、内蔵の固定問題が出題されます</div>
            </div>
          )}

          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {[0,1].map(i=>(
              <div key={i} style={{flex:1,border:`2px solid ${currentPlayer===i?PLAYER_COLORS[i]:"#dee2e6"}`,background:currentPlayer===i?PLAYER_COLORS[i]+"18":"#f8f9fa",borderRadius:8,padding:"6px 10px",textAlign:"center",transition:"all 0.3s"}}>
                <div style={{fontSize:12,fontWeight:"bold",color:PLAYER_COLORS[i]}}><span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:PLAYER_COLORS[i],marginRight:4,verticalAlign:"middle"}}/>{PLAYER_NAMES[i]}</div>
                <div style={{fontSize:11,color:"#555"}}>マス {displayPos[i]+1}/{BOARD_SIZE}</div>
                <div style={{fontSize:11,color:"#27ae60"}}>✅ {scores[i]}問</div>
              </div>
            ))}
          </div>

          <div style={{background:"#f0f4f8",borderRadius:12,padding:8,marginBottom:12,overflow:"auto"}}>{renderBoard()}</div>

          {specialMsg&&<div style={{textAlign:"center",fontSize:18,fontWeight:"bold",color:"#e67e22",animation:"pop 0.4s",marginBottom:8}}>⚡ {specialMsg}！</div>}

          {/* ゲームオーバー */}
          {phase==="gameover"&&(
            <div style={{textAlign:"center",padding:20,background:"#fff9e6",borderRadius:12,border:"3px solid #f39c12",animation:"fadeIn 0.5s"}}>
              <div style={{fontSize:40}}>🏆</div>
              <div style={{fontSize:22,fontWeight:"bold",color:"#e67e22"}}>{PLAYER_NAMES[winner]}のかち！</div>
              <div style={{fontSize:13,color:"#777",marginTop:4}}>正解 {scores[winner]}問</div>
              <button onClick={handleNew} style={{...btn("#f39c12"),marginTop:12,padding:"10px 24px",fontSize:15}}>もう一度あそぶ</button>
            </div>
          )}

          {/* サイコロ */}
          {phase==="roll"&&(
            <div style={{textAlign:"center",animation:"fadeIn 0.3s"}}>
              <div style={{fontSize:13,fontWeight:"bold",color:PLAYER_COLORS[currentPlayer],marginBottom:8}}>{PLAYER_NAMES[currentPlayer]}のターン</div>
              {diceValue&&<div style={{fontSize:52,lineHeight:1,marginBottom:6}}>{["","⚀","⚁","⚂","⚃","⚄","⚅"][diceValue]}</div>}
              <button onClick={rollDice} style={{...btn("#3498db"),padding:"12px 36px",fontSize:16,fontWeight:"bold"}}>🎲 サイコロをふる</button>
            </div>
          )}

          {/* 読み込み中 */}
          {loading&&<div style={{textAlign:"center",padding:16,animation:"fadeIn 0.3s"}}><div style={{fontSize:28}}>🤔</div><div style={{fontSize:13,color:"#555"}}>AIが問題を考えています…</div></div>}

          {/* 回答 */}
          {phase==="answer"&&question&&(
            <div style={{background:"#eaf4fb",borderRadius:12,padding:14,animation:"fadeIn 0.4s"}}>
              <div style={{fontSize:12,color:"#2980b9",fontWeight:"bold",marginBottom:6}}>📝 もんだい ({PLAYER_NAMES[currentPlayer]})</div>
              <div style={{background:"#fff8f0",borderRadius:6,padding:"6px 10px",marginBottom:5,borderLeft:"3px solid #e67e22"}}>
                <div style={{fontSize:10,color:"#e67e22",fontWeight:"bold",marginBottom:2}}>🇯🇵 日本語</div>
                <div style={{fontSize:17,fontWeight:"bold",color:"#2c3e50",lineHeight:1.6}}>{question.question}</div>
              </div>
              {question.question_es&&(
                <div style={{background:"#f0f8ff",borderRadius:6,padding:"6px 10px",marginBottom:8,borderLeft:"3px solid #3498db"}}>
                  <div style={{fontSize:10,color:"#3498db",fontWeight:"bold",marginBottom:2}}>🇪🇸 Español</div>
                  <div style={{fontSize:15,fontWeight:"bold",color:"#2c3e50",lineHeight:1.6}}>{question.question_es}</div>
                </div>
              )}
              <div style={{fontSize:11,color:"#7f8c8d",marginBottom:8}}>💡 {question.hint}</div>
              <div style={{display:"flex",gap:8}}>
                <input ref={inputRef} value={userAnswer} type="text" onChange={e=>setUserAnswer(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitAnswer()} placeholder="こたえ…" style={{flex:1,padding:8,fontSize:16,border:"2px solid #3498db",borderRadius:8,outline:"none"}}/>
                <button onClick={submitAnswer} style={{...btn("#27ae60"),padding:"8px 16px",fontSize:14,fontWeight:"bold"}}>こたえる</button>
              </div>
              <button onClick={()=>speak(question.question)} style={{...btn("#9b59b6"),marginTop:8,fontSize:11,padding:"4px 10px"}}>🔊 もう一度</button>
            </div>
          )}

          {/* 結果 */}
          {phase==="result"&&feedback&&(
            <div style={{background:feedback.correct?"#d5f5e3":"#fadbd8",borderRadius:12,padding:14,animation:"fadeIn 0.4s"}}>
              <div style={{fontSize:18,fontWeight:"bold",color:feedback.correct?"#27ae60":"#e74c3c",marginBottom:feedback.explanation?8:10}}>{feedback.msg}</div>
              {!feedback.correct&&feedback.explanation&&(
                <div style={{background:"#fff",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid #f5c6cb"}}>
                  <div style={{fontSize:12,fontWeight:"bold",color:"#c0392b",marginBottom:6}}>📖 かいせつ</div>
                  <div style={{background:"#fff8f0",borderRadius:6,padding:"6px 10px",marginBottom:6,borderLeft:"3px solid #e67e22"}}>
                    <div style={{fontSize:10,color:"#e67e22",fontWeight:"bold",marginBottom:2}}>🇯🇵 日本語</div>
                    <div style={{fontSize:13,color:"#333",lineHeight:1.7}}>{feedback.explanation}</div>
                  </div>
                  {feedback.explanation_es&&(
                    <div style={{background:"#f0f8ff",borderRadius:6,padding:"6px 10px",marginBottom:6,borderLeft:"3px solid #3498db"}}>
                      <div style={{fontSize:10,color:"#3498db",fontWeight:"bold",marginBottom:2}}>🇪🇸 Español</div>
                      <div style={{fontSize:13,color:"#333",lineHeight:1.7}}>{feedback.explanation_es}</div>
                    </div>
                  )}
                  {feedback.svg&&<ExplanationFigure svgStr={feedback.svg}/>}
                </div>
              )}
              <div style={{textAlign:"center"}}>
                {feedback.correct
                  ? <button onClick={nextTurn} style={{...btn("#3498db"),padding:"10px 24px",fontSize:14,fontWeight:"bold"}}>次のプレイヤーへ →</button>
                  : <button onClick={startPractice} style={{...btn("#e67e22"),padding:"10px 24px",fontSize:14,fontWeight:"bold"}}>✏️ 練習問題をやる（3問）</button>
                }
              </div>
            </div>
          )}

          {/* 練習問題 */}
          {phase==="practice"&&curPQ&&(
            <div style={{background:"#fef9e7",borderRadius:12,padding:14,animation:"fadeIn 0.4s",border:"2px solid #f39c12"}}>
              <div style={{fontSize:12,color:"#e67e22",fontWeight:"bold",marginBottom:6}}>✏️ 練習問題 {practiceIndex+1} / {practiceQuestions.length}　（{PLAYER_NAMES[currentPlayer]}）</div>
              <div style={{background:"#fff8f0",borderRadius:6,padding:"6px 10px",marginBottom:5,borderLeft:"3px solid #e67e22"}}>
                <div style={{fontSize:10,color:"#e67e22",fontWeight:"bold",marginBottom:2}}>🇯🇵 日本語</div>
                <div style={{fontSize:16,fontWeight:"bold",color:"#2c3e50",lineHeight:1.6}}>{curPQ.question}</div>
              </div>
              {curPQ.question_es&&(
                <div style={{background:"#f0f8ff",borderRadius:6,padding:"6px 10px",marginBottom:8,borderLeft:"3px solid #3498db"}}>
                  <div style={{fontSize:10,color:"#3498db",fontWeight:"bold",marginBottom:2}}>🇪🇸 Español</div>
                  <div style={{fontSize:14,fontWeight:"bold",color:"#2c3e50",lineHeight:1.6}}>{curPQ.question_es}</div>
                </div>
              )}
              <div style={{fontSize:11,color:"#7f8c8d",marginBottom:8}}>💡 {curPQ.hint}</div>
              {!practiceFeedback?(
                <div>
                  <div style={{display:"flex",gap:8}}>
                    <input ref={practiceRef} value={practiceAnswer} type="text" onChange={e=>setPracticeAnswer(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submitPractice()} placeholder="こたえ…" style={{flex:1,padding:8,fontSize:16,border:"2px solid #f39c12",borderRadius:8,outline:"none"}}/>
                    <button onClick={submitPractice} style={{...btn("#e67e22"),padding:"8px 16px",fontSize:14,fontWeight:"bold"}}>こたえる</button>
                  </div>
                  <button onClick={()=>speak(curPQ.question)} style={{...btn("#9b59b6"),marginTop:8,fontSize:11,padding:"4px 10px"}}>🔊 もう一度</button>
                </div>
              ):(
                <div>
                  <div style={{fontSize:16,fontWeight:"bold",color:practiceFeedback.correct?"#27ae60":"#e74c3c",marginBottom:8}}>
                    {practiceFeedback.correct?"✅ せいかい！":`❌ ざんねん！正解は ${practiceFeedback.answer}`}
                  </div>
                  {!practiceFeedback.correct&&(
                    <div style={{background:"#fff",borderRadius:8,padding:"8px 10px",marginBottom:8,border:"1px solid #f5c6cb"}}>
                      <div style={{fontSize:11,fontWeight:"bold",color:"#c0392b",marginBottom:4}}>📖 かいせつ</div>
                      <div style={{background:"#fff8f0",borderRadius:6,padding:"5px 8px",marginBottom:5,borderLeft:"3px solid #e67e22"}}>
                        <div style={{fontSize:10,color:"#e67e22",fontWeight:"bold",marginBottom:2}}>🇯🇵 日本語</div>
                        <div style={{fontSize:12,color:"#333",lineHeight:1.6}}>{practiceFeedback.explanation}</div>
                      </div>
                      {practiceFeedback.explanation_es&&(
                        <div style={{background:"#f0f8ff",borderRadius:6,padding:"5px 8px",marginBottom:5,borderLeft:"3px solid #3498db"}}>
                          <div style={{fontSize:10,color:"#3498db",fontWeight:"bold",marginBottom:2}}>🇪🇸 Español</div>
                          <div style={{fontSize:12,color:"#333",lineHeight:1.6}}>{practiceFeedback.explanation_es}</div>
                        </div>
                      )}
                      {practiceFeedback.svg&&<ExplanationFigure svgStr={practiceFeedback.svg}/>}
                    </div>
                  )}
                  <div style={{textAlign:"center"}}>
                    <button onClick={nextPractice} style={{...btn(practiceIndex+1<practiceQuestions.length?"#e67e22":"#27ae60"),padding:"10px 24px",fontSize:14,fontWeight:"bold"}}>
                      {practiceIndex+1<practiceQuestions.length?"次の練習問題 →":"✅ 練習おわり！元のマスへ"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // 描画処理
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
